<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScriptHub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #d6e8f5;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        h1 {
            text-align: center;
            padding-top: 40px;
            color: #1a1a1a;
        }
        h2 {
            text-align: center;
            color: #1a1a1a;
        }
        .err {
            color: red;
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 14px 0;
            color: #888;
            font-size: 12px;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-top: 1px solid #bbb;
        }
        .google-btn {
            width: 100%;
            padding: 7px 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 3px;
            cursor: pointer;
            font-size: 13px;
            font-family: Arial, sans-serif;
            color: #444;
        }
        .google-btn:hover {
            background: #f5f5f5;
        }
        .google-btn svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <h1>Welcome to ScriptHub! Your script workspace</h1>
    <h2>Login or sign up if you don't have an account :)</h2>

    <div style="width: 220px; margin: 60px auto; text-align: center;">
        <input type="text" id="identifier" placeholder="Username or Email"
            style="width: 100%; padding: 5px; margin-bottom: 10px; box-sizing: border-box;" /><br>
        <input type="password" id="password" placeholder="Password"
            style="width: 100%; padding: 5px; margin-bottom: 10px; box-sizing: border-box;" /><br>
        <button id="loginBtn" onclick="handleLogin()" style="width: 100%; padding: 5px;">Login</button>
        <div class="err" id="login-err"></div>

        <div class="divider">or</div>

        <button class="google-btn" id="googleBtn" onclick="handleGoogleLogin()">
            <!-- Google "G" logo SVG -->
            <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                <path fill="none" d="M0 0h48v48H0z"/>
            </svg>
            Sign in with Google
        </button>

        <p style="margin-top: 14px; font-size: 13px;">
            Don't have an account? <a href="register.html">Register here</a>
        </p>
    </div>

    <script>
        const SUPABASE_URL      = 'https://zvhdyptgwkdugldwuuqv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp2aGR5cHRnd2tkdWdsZHd1dXF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNDQwNDMsImV4cCI6MjA5NjgyMDA0M30.MMitZCEYLlX0cMEpDVgyjBG4CFXAOAgbN47s3gRONvU';
        const supabaseClient    = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function handleLogin() {
            const btn        = document.getElementById('loginBtn');
            const identifier = document.getElementById('identifier').value.trim();
            const password   = document.getElementById('password').value;
            const loginErr   = document.getElementById('login-err');

            if (!identifier || !password) {
                loginErr.textContent    = 'Please enter your email/username and password.';
                loginErr.style.display  = 'block';
                return;
            }

            btn.disabled    = true;
            btn.textContent = 'Logging in...';
            loginErr.style.display = 'none';

            let email = identifier;

            // if not an email, look up by username
            if (!identifier.includes('@')) {
                const { data: profile, error: lookupError } = await supabaseClient
                    .from('profiles')
                    .select('email')
                    .eq('username', identifier)
                    .single();

                if (lookupError || !profile) {
                    loginErr.textContent   = 'No account found with that username.';
                    loginErr.style.display = 'block';
                    btn.disabled    = false;
                    btn.textContent = 'Login';
                    return;
                }

                email = profile.email;
            }

            // sign in with email + password
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                loginErr.textContent   = error.message;
                loginErr.style.display = 'block';
                btn.disabled    = false;
                btn.textContent = 'Login';
                return;
            }

            window.location.href = 'dashboard.html';
        }

        async function handleGoogleLogin() {
            const btn = document.getElementById('googleBtn');
            btn.disabled = true;
            btn.textContent = 'Redirecting...';

            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    // After Google auth, Supabase redirects here.
                    // dashboard.html's getUser() call auto-exchanges the OAuth code.
                    redirectTo: window.location.origin + '/user-management/dashboard.html',
                }
            });

            if (error) {
                document.getElementById('login-err').textContent = error.message;
                document.getElementById('login-err').style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = `<svg ...>...</svg> Sign in with Google`;
            }
            // On success, browser is redirected to Google — no further code runs here.
        }
    </script>

</body>
</html>
