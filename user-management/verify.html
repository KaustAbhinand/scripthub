<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - ScriptHub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #d6e8f5;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        h1 { text-align: center; padding-top: 40px; }
        p.subtitle { text-align: center; font-size: 14px; color: #444; }
        .container {
            width: 260px;
            margin: 50px auto;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 6px;
            font-size: 18px;
            text-align: center;
            letter-spacing: 6px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        button {
            width: 100%;
            padding: 6px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 8px;
        }
        .err { color: red; font-size: 12px; display: none; }
        .ok  { color: green; font-size: 12px; display: none; }
        .resend { font-size: 13px; margin-top: 12px; color: #444; }
        .resend a { color: #1a1a8c; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <h1>Verify your email</h1>
    <p class="subtitle">Enter the 6-digit code sent to your email.</p>

    <div class="container">
        <input type="text" id="otp" placeholder="________" maxlength="8" />
        <div class="err" id="otp-err"></div>
        <div class="ok"  id="otp-ok"></div>

        <button id="verifyBtn" onclick="handleVerify()">Verify</button>

        <p class="resend">
            Didn't get the code? <a onclick="handleResend()">Resend</a>
        </p>
    </div>

    <script>
        const SUPABASE_URL      = 'https://zvhdyptgwkdugldwuuqv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp2aGR5cHRnd2tkdWdsZHd1dXF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNDQwNDMsImV4cCI6MjA5NjgyMDA0M30.MMitZCEYLlX0cMEpDVgyjBG4CFXAOAgbN47s3gRONvU';
        const supabaseClient    = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const email = localStorage.getItem('pending_email');

        async function handleVerify() {
            const btn    = document.getElementById('verifyBtn');
            const otp    = document.getElementById('otp').value.trim();
            const errEl  = document.getElementById('otp-err');
            const okEl   = document.getElementById('otp-ok');

            if (!otp || otp.length < 8) {
                errEl.textContent = 'Please enter the 8-digit code.';
                errEl.style.display = 'block';
                okEl.style.display = 'none';
                return;
            }

            btn.disabled    = true;
            btn.textContent = 'Verifying...';

            const { error } = await supabaseClient.auth.verifyOtp({
                email,
                token: otp,
                type: 'signup'
            });

            if (error) {
                errEl.textContent = error.message;
                errEl.style.display = 'block';
                okEl.style.display = 'none';
                btn.disabled    = false;
                btn.textContent = 'Verify';
                return;
            }

            errEl.style.display = 'none';
            okEl.textContent = 'Email verified! Redirecting...';
            okEl.style.display = 'block';
            localStorage.removeItem('pending_email');
            setTimeout(() => window.location.href = 'dashboard.html', 1500);
        }

        async function handleResend() {
            const errEl = document.getElementById('otp-err');
            const okEl  = document.getElementById('otp-ok');

            const { error } = await supabaseClient.auth.resend({
                email,
                type: 'signup'
            });

            if (error) {
                errEl.textContent = error.message;
                errEl.style.display = 'block';
                okEl.style.display = 'none';
                return;
            }

            okEl.textContent = 'Code resent! Check your inbox.';
            okEl.style.display = 'block';
            errEl.style.display = 'none';
        }
    </script>

</body>
</html>
