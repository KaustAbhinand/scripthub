<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Draft</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="submit.js"></script>
    <style>
        body {
            background-color: #d6e8f5;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
        }

        .back-link {
            background: none;
            border: none;
            padding: 0;
            font-family: Arial, sans-serif;
            font-size: 13px;
            color: #1a1a8c;
            text-decoration: underline;
            cursor: pointer;
            display: inline-block;
            margin-bottom: 28px;
        }
        .back-link:hover { color: #0000cc; }


        /* ── Upload section ── */
        .upload-section {
            text-align: center;
            margin-bottom: 10px;
        }

        .upload-btn {
            padding: 8px 24px;
            font-size: 14px;
            font-family: Arial, sans-serif;
            cursor: pointer;
            background-color: #fff;
            border: 1px solid #aac5d9;
            border-radius: 4px;
            color: #1a1a1a;
        }
        .upload-btn:hover { background-color: #edf5fb; }

        .upload-hint {
            font-size: 12px;
            color: #555;
            margin-top: 8px;
        }

        .file-chosen {
            font-size: 12px;
            color: #1a1a8c;
            margin-top: 6px;
            min-height: 16px;
        }

        input[type="file"] { display: none; }

        /* ── Or divider ── */
        .or-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
        }
        .or-divider::before,
        .or-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: #aac5d9;
        }
        .or-divider span {
            font-size: 13px;
            color: #777;
        }

        /* ── Form fields ── */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: #1a1a1a;
            margin-bottom: 6px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 12px;
            font-size: 14px;
            font-family: Arial, sans-serif;
            border: 1px solid #aac5d9;
            border-radius: 4px;
            background-color: #fff;
            color: #1a1a1a;
        }
        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #5a8aa8;
        }
        input[type="text"].invalid,
        textarea.invalid {
            border-color: #b00;
        }

        #draft-content {
            resize: vertical;
            min-height: 220px;
        }

        .field-error {
            font-size: 12px;
            color: #b00;
            margin-top: 4px;
            display: none;
        }

        /* ── Submit ── */
        .submit-row {
            margin-top: 28px;
            text-align: center;
        }

        .submit-btn {
            padding: 9px 32px;
            font-size: 14px;
            font-family: Arial, sans-serif;
            cursor: pointer;
            background-color: #1a1a8c;
            color: #fff;
            border: none;
            border-radius: 4px;
        }
        .submit-btn:hover:not(:disabled) { background-color: #14148a; }
        .submit-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .submit-error {
            font-size: 13px;
            color: #b00;
            text-align: center;
            margin-top: 12px;
            display: none;
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <button class="back-link" id="back-link">&larr; Back</button>

        <h1>Upload your file!</h1>

        <!-- File upload -->
        <div class="upload-section">
            <button class="upload-btn" onclick="document.getElementById('file-input').click()">
                Upload your file
            </button>
            <p class="upload-hint">Accepted formats: .pdf, .txt, .docx</p>
            <p class="file-chosen" id="file-chosen"></p>
            <input
                type="file"
                id="file-input"
                accept=".pdf,.txt,.docx"
                onchange="onFileChosen()"
            />
        </div>

        <!-- Or divider -->
        <div class="or-divider"><span>Or</span></div>

        <!-- Write draft -->
        <div class="form-group">
            <label for="draft-content">Write your draft here</label>
            <textarea
                id="draft-content"
                placeholder="Start writing..."
                oninput="onWriteInput()"
            ></textarea>
        </div>

        <!-- Commit message -->
        <div class="form-group">
            <label for="commit-message">Commit message <span style="color:#b00">*</span></label>
            <input
                type="text"
                id="commit-message"
                placeholder="e.g. Added opening scene"
                maxlength="200"
                oninput="clearError('commit-message', 'commit-error')"
            />
            <p class="field-error" id="commit-error">Commit message is required.</p>
        </div>

        <p class="submit-error" id="submit-error"></p>

        <div class="submit-row">
            <button class="submit-btn" id="submit-btn" onclick="handleSubmit()">Submit draft</button>
        </div>
    </div>

    <div class="footer">&copy; ScriptHub</div>

</body>
</html>
