<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idea - ScriptHub</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            background-color: #d6e8f5;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
        }

        .back-link {
            background: none;
            border: none;
            padding: 0;
            font-family: Arial, sans-serif;
            font-size: 13px;
            color: #1a1a8c;
            text-decoration: underline;
            cursor: pointer;
            display: inline-block;
            margin-bottom: 30px;
        }

        .back-link:hover {
            color: #0000cc;
        }

        .idea-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .idea-header h1 {
            font-size: 26px;
            font-weight: bold;
            color: #1a1a1a;
            margin: 0 0 12px 0;
        }

        .idea-header p {
            font-size: 14px;
            color: #444;
            margin: 0 auto;
            max-width: 520px;
            line-height: 1.6;
        }

        .idea-genre {
            display: inline-block;
            margin-top: 10px;
            font-size: 12px;
            color: #fff;
            background-color: #5a8aa8;
            padding: 2px 10px;
            border-radius: 10px;
        }

        .drafts-section {
            max-width: 680px;
            margin: 0 auto;
        }

        .drafts-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .drafts-header span {
            font-size: 15px;
            font-weight: bold;
            color: #1a1a1a;
        }

        .upload-btn {
            padding: 5px 12px;
            font-size: 13px;
            font-family: Arial, sans-serif;
            cursor: pointer;
        }

        .draft-list {
            width: 100%;
        }

        /* Column header row */
        .draft-list-header {
            display: grid;
            grid-template-columns: 180px 1fr 110px 220px;
            padding: 6px 4px;
            border-bottom: 2px solid #aac5d9;
            font-size: 12px;
            font-weight: bold;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .draft-list-header .col-actions {
            text-align: right;
        }

        .draft-wrapper {
            border-bottom: 1px solid #aac5d9;
        }

        /* Each draft row uses the same grid */
        .draft-item {
            display: grid;
            grid-template-columns: 180px 1fr 110px 220px;
            align-items: center;
            gap: 0;
            padding: 10px 4px;
            cursor: pointer;
        }

        .draft-item:hover {
            background-color: #cce0f0;
        }

        .draft-name {
            font-size: 14px;
            color: #1a1a8c;
        }

        .draft-date {
            font-size: 12px;
            color: #888;
            white-space: nowrap;
        }

        .draft-description {
            font-size: 13px;
            color: #555;
            padding-right: 12px;
            line-height: 1.4;
            word-break: break-word;
    }

        .draft-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .upload-version-btn {
            padding: 4px 10px;
            font-size: 12px;
            font-family: Arial, sans-serif;
            cursor: pointer;
            justify-self: end;
            margin-right: 8px;
        }

        .delete-draft-btn {
            padding: 4px 10px;
            font-size: 12px;
            font-family: Arial, sans-serif;
            cursor: pointer;
            background: none;
            border: 1px solid #d99;
            color: #b00;
            border-radius: 4px;
            justify-self: end;
        }

        .delete-draft-btn:hover {
            background: #ffecec;
        }

        .versions-container {
            display: none;
            padding-left: 28px;
            background-color: rgba(255,255,255,0.15);
        }

        .version-item {
            display: block;
            padding: 8px 0;
            color: #1a1a8c;
            text-decoration: none;
            font-size: 13px;
        }

        .version-item:hover {
            text-decoration: underline;
        }

        .no-drafts {
            padding: 28px 14px;
            font-size: 13px;
            color: #555;
            text-align: center;
        }

        .loading {
            font-size: 13px;
            color: #555;
            text-align: center;
            padding: 20px 0;
        }

        .idea-footer {
            max-width: 680px;
            margin: 60px auto 0 auto;
            text-align: right;
        }

        .delete-idea-btn {
            background: none;
            border: none;
            font-family: Arial, sans-serif;
            font-size: 13px;
            color: #888;
            text-decoration: underline;
            cursor: pointer;
            padding: 0;
        }

        .delete-idea-btn:hover {
            color: #b00;
        }

        .popup-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .popup-box {
            background: #fff;
            border-radius: 6px;
            padding: 28px 28px 22px 28px;
            max-width: 340px;
            width: 90%;
            text-align: center;
            box-shadow: 0 4px 18px rgba(0,0,0,0.15);
        }

        .popup-box p {
            font-size: 14px;
            color: #1a1a1a;
            margin: 0 0 22px 0;
            line-height: 1.6;
        }

        .popup-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .popup-yes {
            padding: 7px 22px;
            font-size: 13px;
            font-family: Arial, sans-serif;
            background-color: #b00;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .popup-yes:hover {
            background-color: #900;
        }

        .popup-no {
            padding: 7px 22px;
            font-size: 13px;
            font-family: Arial, sans-serif;
            background: none;
            border: 1px solid #aac5d9;
            border-radius: 4px;
            cursor: pointer;
            color: #1a1a1a;
        }

        .popup-no:hover {
            background-color: #edf5fb;
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>

<body>

    <button class="back-link" onclick="window.location.href='../user-management/dashboard.html'">
        &larr; Back to dashboard
    </button>

    <div class="idea-header">
        <h1 id="idea-name">...</h1>
        <p id="idea-description"></p>
        <span class="idea-genre" id="idea-genre" style="display:none"></span>
    </div>

    <div class="drafts-section">
        <div class="drafts-header">
            <span>Drafts</span>

            <button
                class="upload-btn"
                id="upload-btn"
                onclick="handleUpload()">
                New Draft
            </button>
        </div>

        <!-- Column headers -->
        <div class="draft-list-header">
            <span>Title</span>
            <span>Description</span>
            <span>Uploaded</span>
            <span class="col-actions">Actions</span>
        </div>

        <div class="draft-list" id="draft-list">
            <p class="loading">Loading...</p>
        </div>
    </div>

    <div class="idea-footer">
        <button
            class="delete-idea-btn"
            onclick="confirmDeleteIdea()">
            Delete idea
        </button>
    </div>

    <div class="footer">
        &copy; ScriptHub
    </div>

    <div
        class="popup-overlay"
        id="delete-popup"
        style="display:none">

        <div class="popup-box">
            <p>
                Are you sure you want to delete this idea?
                <br>
                This is permanent.
            </p>

            <div class="popup-actions">
                <button
                    class="popup-yes"
                    onclick="deleteIdea()">
                    Yes, delete
                </button>

                <button
                    class="popup-no"
                    onclick="closePopup()">
                    No
                </button>
            </div>
        </div>
    </div>

    <script src="idea.js"></script>
    <script src="delete_idea.js"></script>

</body>
</html>
