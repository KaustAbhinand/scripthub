<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Idea</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #d6e8f5;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        .back-link {
            background: none;
            border: none;
            padding: 0;
            font-family: Arial, sans-serif;
            font-size: 13px;
            color: #1a1a8c;
            text-decoration: underline;
            cursor: pointer;
            margin-bottom: 28px;
            display: inline-block;
        }
        .back-link:hover { color: #0000cc; }

        h1 {
            font-size: 20px;
            font-weight: bold;
            color: #1a1a1a;
            margin: 0 0 28px 0;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: #1a1a1a;
            margin-bottom: 5px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 8px 10px;
            font-size: 14px;
            font-family: Arial, sans-serif;
            border: 1px solid #aac5d9;
            border-radius: 4px;
            background-color: #fff;
            color: #1a1a1a;
        }
        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #5a8aa8;
        }
        input[type="text"].invalid {
            border-color: #b00;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .field-error {
            font-size: 12px;
            color: #b00;
            margin-top: 4px;
            display: none;
        }

        .create-btn-row {
            margin-top: 50px;
            text-align: center;
        }

        .create-btn {
            padding: 8px 28px;
            font-size: 14px;
            font-family: Arial, sans-serif;
            cursor: pointer;
            background-color: #1a1a8c;
            color: #fff;
            border: none;
            border-radius: 4px;
        }
        .create-btn:hover:not(:disabled) { background-color: #14148a; }
        .create-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .submit-error {
            font-size: 13px;
            color: #b00;
            text-align: center;
            margin-top: 12px;
            display: none;
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <button class="back-link" onclick="window.location.href='../user-management/dashboard.html'">&larr; Back</button>

        <h1>New idea</h1>

        <div class="form-group">
            <label for="idea-name">Name <span style="color:#b00">*</span></label>
            <input
                type="text"
                id="idea-name"
                placeholder="What's the idea called?"
                maxlength="100"
                oninput="clearNameError()"
            />
            <p class="field-error" id="name-error">Name is required.</p>
        </div>

        <div class="form-group">
            <label for="idea-genre">Genre</label>
            <input
                type="text"
                id="idea-genre"
                placeholder="e.g. Thriller, Drama, Sci-fi  (optional)"
                maxlength="60"
            />
        </div>

        <div class="form-group">
            <label for="idea-description">Description</label>
            <textarea
                id="idea-description"
                placeholder="What's this idea about?  (optional)"
                maxlength="500"
            ></textarea>
        </div>

        <div class="create-btn-row">
            <button class="create-btn" id="create-btn" onclick="handleCreate()">Create</button>
        </div>
        <p class="submit-error" id="submit-error"></p>
    </div>

    <div class="footer">&copy; ScriptHub</div>

    <script>
        const SUPABASE_URL      = 'https://zvhdyptgwkdugldwuuqv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp2aGR5cHRnd2tkdWdsZHd1dXF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNDQwNDMsImV4cCI6MjA5NjgyMDA0M30.MMitZCEYLlX0cMEpDVgyjBG4CFXAOAgbN47s3gRONvU';
        const supabaseClient    = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;

        async function init() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) {
                window.location.href = '../user-management/index.html';
                return;
            }
            currentUser = user;
        }

        function clearNameError() {
            document.getElementById('idea-name').classList.remove('invalid');
            document.getElementById('name-error').style.display = 'none';
        }

        async function handleCreate() {
            // Clear previous errors
            document.getElementById('submit-error').style.display = 'none';

            const name        = document.getElementById('idea-name').value.trim();
            const genre       = document.getElementById('idea-genre').value.trim();
            const description = document.getElementById('idea-description').value.trim();

            // Validate
            if (!name) {
                document.getElementById('idea-name').classList.add('invalid');
                document.getElementById('name-error').style.display = 'block';
                document.getElementById('idea-name').focus();
                return;
            }

            const btn = document.getElementById('create-btn');
            btn.disabled    = true;
            btn.textContent = 'Creating...';

            const { data, error } = await supabaseClient
                .from('ideas')
                .insert({
                    user_id:     currentUser.id,
                    name,
                    genre:       genre       || null,
                    description: description || null,
                })
                .select('id')
                .single();

            if (error) {
                console.error(error);
                const errEl = document.getElementById('submit-error');
                errEl.textContent  = 'Something went wrong. Please try again.';
                errEl.style.display = 'block';
                btn.disabled    = false;
                btn.textContent = 'Create';
                return;
            }

            window.location.href = `idea.html?id=${data.id}`;
        }

        init();
    </script>

</body>
</html>
